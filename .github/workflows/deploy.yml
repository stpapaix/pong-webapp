name: Deploy Pong Web App to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  provision:
    name: Provision Azure Infrastructure
    runs-on: ubuntu-latest
    outputs:
      swa_name: ${{ steps.deploy_bicep.outputs.staticWebAppName }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name rg-pong-webapp \
            --location eastus2

      - name: Deploy Bicep template
        id: deploy_bicep
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group rg-pong-webapp \
            --template-file infra/main.bicep \
            --parameters appName=pong-webapp \
            --query "properties.outputs" \
            --output json)

          SWA_NAME=$(echo $OUTPUT | jq -r '.staticWebAppName.value')
          SWA_URL=$(echo $OUTPUT | jq -r '.staticWebAppUrl.value')

          echo "staticWebAppName=$SWA_NAME" >> $GITHUB_OUTPUT
          echo "staticWebAppUrl=$SWA_URL"
          echo "### Deployed to: $SWA_URL" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy App to Static Web App
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Static Web App deployment token
        id: get_token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name pong-webapp \
            --resource-group rg-pong-webapp \
            --query "properties.apiKey" \
            --output tsv)
          echo "swa_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get_token.outputs.swa_token }}
          repo_token: ${{ secrets.REPO_TOKEN }}
          action: upload
          app_location: '/'
          output_location: ''
