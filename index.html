<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steph Pong</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>STEPH PONG</h1>
  <div id="scoreboard">
    <span id="player-score">0</span>
    <span class="divider">:</span>
    <span id="ai-score">0</span>
  </div>
  <div id="labels">
    <span>YOU</span>
    <span>AI</span>
  </div>
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div id="message" class="hidden"></div>
  <div class="indicators">
    <div id="speed-indicator" class="speed"></div>
    <div id="ai-indicator" class="ai-level"></div>
  </div>
  <p class="hint">Move <strong>mouse</strong> to play &mdash; <strong>click / SPACE</strong> to start &mdash; <strong>ESC</strong> to exit &mdash; <strong>1&ndash;5</strong> speed &mdash; <strong>A/B/C</strong> AI level</p>
  <script src="game.js"></script>
</body>
</html>
